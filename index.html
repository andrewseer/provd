<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provd — is it real?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bellefair&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000000;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 24px;
  }

  .logo {
    font-family: 'Bellefair', serif;
    font-size: 64px;
    color: #00E5CC;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #666666;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 52px;
  }

  .top-line {
    width: 100%;
    max-width: 640px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00E5CC, transparent);
    margin-bottom: 52px;
    opacity: 0.4;
  }

  .card {
    background: #0A0A0A;
    border: 1px solid #2A2A2A;
    border-radius: 2px;
    padding: 36px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 24px;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #666666;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .mode-toggle {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    background: #000000;
    border: 1px solid #2A2A2A;
    border-radius: 2px;
    padding: 4px;
  }

  .mode-btn {
    flex: 1;
    background: transparent;
    color: #666666;
    border: none;
    border-radius: 1px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    width: auto;
    margin: 0;
  }

  .mode-btn.active {
    background: #141414;
    color: #00E5CC;
    border: 1px solid #00E5CC22;
  }

  .mode-btn:hover:not(.active) { color: #CCCCCC; }

  textarea {
    width: 100%;
    background: #050505;
    border: 1px solid #2A2A2A;
    border-radius: 1px;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    padding: 20px;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #00E5CC55; }
  textarea::placeholder { color: #444444; }

  .image-drop {
    width: 100%;
    background: #050505;
    border: 1px dashed #2A2A2A;
    border-radius: 1px;
    padding: 56px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    display: none;
  }

  .image-drop.active { display: block; }
  .image-drop:hover { border-color: #00E5CC55; }
  .image-drop.has-image { border-style: solid; border-color: #00E5CC33; padding: 16px; }

  .drop-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #888888;
    letter-spacing: 0.08em;
  }

  .drop-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555555;
    letter-spacing: 0.08em;
    margin-top: 8px;
  }

  #imagePreview {
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    border-radius: 1px;
    display: none;
  }

  #imagePreview.visible { display: block; }

  input[type="file"] { display: none; }

  button.scan-btn {
    width: 100%;
    background: #00E5CC;
    color: #000000;
    border: none;
    border-radius: 1px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.2s;
  }

  button.scan-btn:hover { opacity: 0.85; }
  button.scan-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .result-card {
    background: #0A0A0A;
    border: 1px solid #2A2A2A;
    border-radius: 2px;
    padding: 36px;
    width: 100%;
    max-width: 640px;
    display: none;
  }

  .result-card.visible { display: block; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 36px;
  }

  .score-circle {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }

  .score-circle svg { transform: rotate(-90deg); }

  .score-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number {
    font-family: 'Bellefair', serif;
    font-size: 36px;
    line-height: 1;
  }

  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #666666;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .verdict { flex: 1; }

  .verdict-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 300;
    color: #FFFFFF;
    margin-bottom: 12px;
  }

  .verdict-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #00E5CC;
    border: 1px solid #00E5CC33;
    padding: 4px 10px;
    border-radius: 1px;
    letter-spacing: 0.06em;
  }

  .breakdown {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid #1A1A1A;
  }

  .breakdown-item {
    flex: 1;
    background: #000000;
    border: 1px solid #1A1A1A;
    border-radius: 1px;
    padding: 16px;
    text-align: center;
  }

  .breakdown-val {
    font-family: 'Bellefair', serif;
    font-size: 28px;
    color: #00E5CC;
  }

  .breakdown-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #666666;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .signals-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #666666;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-top: 28px;
    border-top: 1px solid #1A1A1A;
  }

  .signal { margin-bottom: 18px; }

  .signal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .signal-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #AAAAAA;
  }

  .signal-val {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #666666;
  }

  .signal-bar-bg {
    height: 2px;
    background: #1A1A1A;
    border-radius: 1px;
    overflow: hidden;
  }

  .signal-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .narrative {
    margin-top: 28px;
    padding-top: 28px;
    border-top: 1px solid #1A1A1A;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: #CCCCCC;
    line-height: 1.8;
  }

  .loading { text-align: center; padding: 48px; display: none; }
  .loading.visible { display: block; }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #666666;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .footer {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #333333;
    letter-spacing: 0.12em;
    margin-top: 64px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="logo">provd</div>
<p class="tagline">verification layer for the internet</p>
<div class="top-line"></div>

<div class="card">
  <div class="card-label">choose what to verify</div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('text', this)">text</button>
    <button class="mode-btn" onclick="setMode('image', this)">image</button>
    <button class="mode-btn" onclick="setMode('both', this)">text + image</button>
  </div>

  <textarea id="inputText" placeholder="paste a post, caption, article, or any text you want to verify..."></textarea>

  <div class="image-drop" id="imageDrop" onclick="document.getElementById('fileInput').click()">
    <img id="imagePreview" alt="preview" />
    <div id="dropPrompt">
      <div class="drop-label">click to upload an image</div>
      <div class="drop-sub">jpg, png, webp — max 10mb</div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)" />

  <button class="scan-btn" id="scanBtn" onclick="runScan()">scan content</button>
</div>

<div class="loading" id="loading">
  <p class="loading-text">analyzing content...</p>
</div>

<div class="result-card" id="resultCard">
  <div class="score-row">
    <div class="score-circle">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="54" fill="none" stroke="#111111" stroke-width="3"/>
        <circle id="scoreArc" cx="60" cy="60" r="54" fill="none" stroke="#00E5CC" stroke-width="3"
          stroke-dasharray="0 339.29" stroke-linecap="round"/>
      </svg>
      <div class="score-inner">
        <span class="score-number" id="scoreNumber">0</span>
        <span class="score-label">human score</span>
      </div>
    </div>
    <div class="verdict">
      <div class="verdict-title" id="verdictTitle">—</div>
      <div class="verdict-tags" id="verdictTags"></div>
    </div>
  </div>

  <div class="breakdown" id="breakdown" style="display:none"></div>

  <div class="signals-title">signal breakdown</div>
  <div id="signals"></div>
  <div class="narrative" id="narrative"></div>
</div>

<div class="footer">provd · built on reality network</div>

<script>
let currentMode = 'text';
let imageBase64 = null;

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const textArea = document.getElementById('inputText');
  const imageDrop = document.getElementById('imageDrop');

  if (mode === 'text') {
    textArea.style.display = 'block';
    imageDrop.classList.remove('active');
  } else if (mode === 'image') {
    textArea.style.display = 'none';
    imageDrop.classList.add('active');
  } else {
    textArea.style.display = 'block';
    imageDrop.classList.add('active');
  }
}

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    imageBase64 = e.target.result;
    const preview = document.getElementById('imagePreview');
    preview.src = imageBase64;
    preview.classList.add('visible');
    document.getElementById('dropPrompt').style.display = 'none';
    document.getElementById('imageDrop').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

async function runScan() {
  const text = document.getElementById('inputText').value.trim();

  if (currentMode === 'text' && text.length < 20) {
    alert('please paste at least a sentence or two to analyze');
    return;
  }
  if (currentMode === 'image' && !imageBase64) {
    alert('please upload an image to analyze');
    return;
  }

  document.getElementById('scanBtn').disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('resultCard').classList.remove('visible');

  try {
    const body = {};
    if (currentMode !== 'image') body.text = text;
    if (currentMode !== 'text' && imageBase64) body.image = imageBase64;

    const response = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const result = await response.json();
    if (result.error) throw new Error(result.error);
    displayResult(result);

  } catch (err) {
    alert('something went wrong — check the console for details');
    console.error(err);
  } finally {
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('loading').classList.remove('visible');
  }
}

function displayResult(result) {
  const score = result.humanScore;
  const circ = 2 * Math.PI * 54;
  const fill = (score / 100) * circ;
  const color = score >= 70 ? '#00E5CC' : score >= 40 ? '#FFFFFF' : '#666666';

  const arc = document.getElementById('scoreArc');
  arc.setAttribute('stroke', color);
  setTimeout(() => {
    arc.setAttribute('stroke-dasharray', `${fill} ${circ - fill}`);
  }, 100);

  let display = 0;
  const timer = setInterval(() => {
    display = Math.min(display + 2, score);
    document.getElementById('scoreNumber').textContent = display;
    if (display >= score) clearInterval(timer);
  }, 20);

  document.getElementById('scoreNumber').style.color = color;
  document.getElementById('verdictTitle').textContent =
    score >= 70 ? 'likely human' : score >= 40 ? 'origin unclear' : 'likely AI generated';

  const tagsEl = document.getElementById('verdictTags');
  tagsEl.innerHTML = '';
  (result.tags || []).forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  });

  const breakdownEl = document.getElementById('breakdown');
  if (result.breakdown) {
    breakdownEl.style.display = 'flex';
    breakdownEl.innerHTML = '';
    Object.entries(result.breakdown).forEach(([key, val]) => {
      breakdownEl.innerHTML += `
        <div class="breakdown-item">
          <div class="breakdown-val">${val}</div>
          <div class="breakdown-label">${key} score</div>
        </div>`;
    });
  } else {
    breakdownEl.style.display = 'none';
  }

  const signalsEl = document.getElementById('signals');
  signalsEl.innerHTML = '';
  (result.signals || []).forEach(sig => {
    const barColor = sig.flagged ? '#FFFFFF' : '#00E5CC';
    signalsEl.innerHTML += `
      <div class="signal">
        <div class="signal-header">
          <span class="signal-name" style="color:${sig.flagged ? '#FFFFFF' : '#AAAAAA'}">${sig.name}</span>
          <span class="signal-val">${sig.value}</span>
        </div>
        <div class="signal-bar-bg">
          <div class="signal-bar-fill" style="width:0%;background:${barColor}" data-width="${sig.value}%"></div>
        </div>
      </div>`;
  });

  setTimeout(() => {
    document.querySelectorAll('.signal-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width;
    });
  }, 100);

  document.getElementById('narrative').textContent = result.narrative;
  document.getElementById('resultCard').classList.add('visible');
}
</script>
</body>
</html>
